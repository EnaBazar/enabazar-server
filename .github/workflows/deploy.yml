name: Deploy to VPS (Build Once)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    # ---------------- CLIENT BUILD ----------------
    - name: Build Client
      run: |
        cd client
        npm ci
        npm run build

    # ---------------- ADMIN BUILD ----------------
    - name: Build Admin
      run: |
        cd admin
        npm ci
        npm run build

    # ---------------- DEPLOY ----------------
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Backend
          cd /var/www/enabazar-server
          git reset --hard
          git pull origin main
          npm ci
          pm2 restart project-backend

          # Client deploy
          rm -rf /var/www/client/*
          
          # Admin deploy
          rm -rf /var/www/admin/*

          sudo systemctl reload nginx
