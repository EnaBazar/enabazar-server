name: Deploy to VPS

on:
  push:
    branches:
      - main  # main branch-এ push হলে workflow চলবে

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install dependencies & Build admin
      run: |
        cd admin
        npm ci
        npm run build

    - name: Install dependencies & Build admin
      run: |
        cd admin
        npm ci
        npm run build

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/enabazar-server
          git reset --hard
          git pull origin main
          cd admin
          npm ci
          npm run build
          cd ..
          cd admin
          npm ci
          npm run build
          cd ..
          pm2 restart project-backend
